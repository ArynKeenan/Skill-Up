<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skill Up</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">Skill Up</h1>
            <a href="#"><i class="fa fa-cog" aria-hidden="true"></i></a>
        </div>
    </nav>

    <hr>

    <header>
        <h2>Match Score</h2>
        <div class="progress-container">
            <div class="progress-bar" id="myProgressBar"></div>
        </div>
        <h1><span id="progressText">0</span>%</h1>
    </header>

    <hr>


    <div class="user-skill-container">
        <div>
            <div class="user-skills-header">
                <h2><i class="fa fa-check-circle" aria-hidden="true"></i> You Have (4)</h2>
            </div>
            <div class="badges">
                <a class="green">HTML</a>
                <a class="green">CSS</a>
                <a class="green">AWS</a>
                <a class="green">React</a>
                <a class="green">Javascript</a>
            </div>
        </div>
        <div>
            <div class="site-learning-header">
                <h2><i class="fa fa-times-circle" aria-hidden="true"></i> To Learn (5)</h2>
            </div>
            <div class="badges">
                <a class="red">Node.Js</a>
                <a class="red">Oracle Db</a>
                <a class="red">Python</a>
                <a class="red">Docker</a>
            </div>
        </div>
    </div> 
    
    <footer>
        <button class="button" id="compare-Btn">Compare</button>
        <button class="button"  id="findSkills-Btn">Update Skills</button>
    </footer>

    <script src="index.js"></script>
</body>
</html>
